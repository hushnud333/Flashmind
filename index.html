<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlashMind - Pro Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --primary: #6366f1;
  --bg-gradient: linear-gradient(135deg, #f8faff 0%, #eef2ff 100%);
  --english: #4f46e5;
  --math: #f59e0b;
  --science: #10b981;
  --custom: #ec4899;
  --slate-800: #1e293b;
  --slate-500: #64748b;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg-gradient);
  min-height: 100vh; color: var(--slate-800);
  display: flex; flex-direction: column;
}

/* Welcome Screen */
#welcome-screen {
  position: fixed; inset: 0; background: white; z-index: 1000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 20px;
}
.welcome-logo {
  width: 100px; height: 100px; background: linear-gradient(135deg, var(--primary), #a855f7);
  border-radius: 30px; color: white; font-size: 50px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
  box-shadow: 0 20px 40px rgba(99,102,241,0.3);
}
.start-btn {
  padding: 18px 48px; font-size: 18px; font-weight: 700; color: white;
  background: var(--slate-800); border: none; border-radius: 20px; cursor: pointer;
  transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}
.start-btn:active { transform: scale(0.95); }

/* Navigation */
nav {
  background: rgba(255,255,255,0.8); backdrop-filter: blur(15px);
  padding: 15px 20px; position: sticky; top: 0; z-index: 100;
}
.nav-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }

.container { max-width: 600px; margin: 0 auto; padding: 20px; flex: 1; display: none; width: 100%; }

/* Hero Card */
.hero {
  background: var(--primary);
  border-radius: 28px; padding: 35px 25px; color: white; margin-bottom: 25px;
  text-align: center; transition: 0.5s ease;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

/* Input Section */
.gen-section {
  background: white; border-radius: 24px; padding: 20px; margin-bottom: 25px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05);
}
.gen-row { display: flex; flex-direction: column; gap: 12px; }
.gen-input { 
  padding: 15px; border-radius: 16px; border: 2px solid #f1f5f9; 
  outline: none; font-size: 16px; transition: 0.2s;
}
.gen-input:focus { border-color: var(--primary); background: #f8faff; }
.save-btn { 
  padding: 15px; border-radius: 16px; background: var(--slate-800); 
  color: white; border: none; font-weight: 700; cursor: pointer; font-size: 16px;
}

/* Cards Grid */
.cards-grid { 
  display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 120px; 
}
.card-wrap { perspective: 1000px; height: 180px; }
.card-inner { 
  position: relative; width: 100%; height: 100%; 
  transform-style: preserve-3d; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
}
.card-wrap.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
  border-radius: 24px; display: flex; flex-direction: column; 
  align-items: center; justify-content: center; padding: 20px; text-align: center;
  box-shadow: 0 8px 15px rgba(0,0,0,0.05);
}
.card-front { background: white; border: 1px solid #f1f5f9; color: var(--slate-800); }
.card-back { background: var(--primary); color: white; transform: rotateY(180deg); }

.del-btn {
  margin-top: 15px; background: rgba(255,255,255,0.2); border: none;
  padding: 6px 12px; border-radius: 10px; color: white; font-size: 11px; cursor: pointer;
}

/* Bottom Nav (Icons Only) */
.bottom-nav {
  background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
  padding: 15px 10px 30px 10px; position: fixed; bottom: 0; width: 100%;
  display: none; justify-content: space-around; align-items: center;
  border-top: 1px solid rgba(0,0,0,0.05); border-radius: 30px 30px 0 0;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
}
.subj-tab {
  width: 55px; height: 55px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; cursor: pointer; transition: 0.3s;
  background: #f1f5f9; border: none;
}
.subj-tab.active {
  background: var(--active-color, var(--primary));
  color: white; transform: translateY(-8px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

@media (max-width: 400px) {
  .cards-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="welcome-screen">
  <div class="welcome-logo">F</div>
  <h1 style="font-weight:800; font-size: 32px; letter-spacing: -1px;">FlashMind</h1>
  <p style="color:var(--slate-500); margin-bottom:40px; font-size: 16px;">O'rganishni osonlashtiring</p>
  <button class="start-btn" onclick="startStudy()">Start Study</button>
</div>

<nav id="main-nav" style="display:none">
  <div class="nav-inner">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:34px; height:34px; background:var(--slate-800); border-radius:10px; display:flex; align-items:center; justify-content:center; color:white; font-weight:800">F</div>
      <span style="font-weight:800; font-size: 18px;">FlashMind</span>
    </div>
    <button onclick="location.reload()" style="background:#fee2e2; border:none; color:#ef4444; padding: 8px 15px; border-radius: 12px; cursor:pointer; font-weight:700; font-size: 13px;">Chiqish</button>
  </div>
</nav>

<div class="container" id="main-container">
  <div class="hero" id="hero-box">
    <h2 id="currentTitle" style="font-weight:800; font-size:28px; margin-bottom: 5px;">Ingliz tili</h2>
    <p id="cardCount" style="opacity:0.9; font-size:14px; font-weight: 500;">0 ta karta mavjud</p>
  </div>

  <div class="gen-section">
    <div class="gen-row">
      <input class="gen-input" id="termInput" placeholder="Savol..."/>
      <input class="gen-input" id="defInput" placeholder="Javob..."/>
      <button class="save-btn" id="addBtn" onclick="addManualCard()">Kartani Qo'shish</button>
    </div>
  </div>

  <div id="cardsGrid" class="cards-grid"></div>
  <div id="emptyState" style="text-align:center; padding:40px; color:var(--slate-400); font-weight: 600;">Hali kartalar yo'q 👾</div>
</div>

<div class="bottom-nav" id="bottom-tabs">
  <button class="subj-tab active" onclick="switchSubject('english', '#4f46e5', this)">📖</button>
  <button class="subj-tab" onclick="switchSubject('math', '#f59e0b', this)">📐</button>
  <button class="subj-tab" onclick="switchSubject('science', '#10b981', this)">🔬</button>
  <button class="subj-tab" onclick="switchSubject('custom', '#ec4899', this)">✨</button>
</div>

<script>
let currentSubject = 'english';
let decks = JSON.parse(localStorage.getItem('flashmind_decks')) || {
  english: [{term: "Apple", definition: "Olma"}, {term: "Study", definition: "O'qish"}],
  math: [], science: [], custom: []
};

function startStudy() {
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('main-nav').style.display = 'block';
  document.getElementById('main-container').style.display = 'block';
  document.getElementById('bottom-tabs').style.display = 'flex';
  renderCards();
}

function saveToLocal() { localStorage.setItem('flashmind_decks', JSON.stringify(decks)); }

function switchSubject(subj, color, el) {
  currentSubject = subj;
  
  // Tablarni yangilash
  document.querySelectorAll('.subj-tab').forEach(tab => {
    tab.classList.remove('active');
    tab.style.setProperty('--active-color', color);
  });
  el.classList.add('active');

  // Ranglarni yangilash
  const hero = document.getElementById('hero-box');
  const cardBacks = document.querySelectorAll('.card-back');
  hero.style.background = color;
  document.getElementById('addBtn').style.background = color;
  
  const titles = {english:'Ingliz tili', math:'Matematika', science:'Tabiiy fanlar', custom:'Mening kartalarim'};
  document.getElementById('currentTitle').innerText = titles[subj];
  
  renderCards();
}

function addManualCard() {
  const term = document.getElementById('termInput').value;
  const def = document.getElementById('defInput').value;
  if(!term || !def) return;

  decks[currentSubject].push({term, definition: def});
  saveToLocal();
  document.getElementById('termInput').value = '';
  document.getElementById('defInput').value = '';
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const empty = document.getElementById('emptyState');
  const currentCards = decks[currentSubject];
  const color = getComputedStyle(document.querySelector('.subj-tab.active')).getPropertyValue('--active-color');
  
  document.getElementById('cardCount').innerText = `${currentCards.length} ta karta mavjud`;
  grid.innerHTML = '';
  
  if(currentCards.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    currentCards.forEach((card, index) => {
      grid.innerHTML += `
        <div class="card-wrap" onclick="this.classList.toggle('flipped')">
          <div class="card-inner">
            <div class="card-face card-front">
              <div style="font-weight:800; font-size:18px">${card.term}</div>
            </div>
            <div class="card-face card-back" style="background:${color}">
              <div style="font-weight:600; font-size:16px">${card.definition}</div>
              <button class="del-btn" onclick="deleteCard(${index}, event)">O'chirish</button>
            </div>
          </div>
        </div>
      `;
    });
  }
}

function deleteCard(index, event) {
  event.stopPropagation();
  decks[currentSubject].splice(index, 1);
  saveToLocal();
  renderCards();
}
</script>

</body>
</html>
<div class="bottom-nav" id="bottom-tabs">
  <button class="subj-tab active" onclick="switchSubject('english', '#4f46e5', this)">📖</button>
  <button class="subj-tab" onclick="switchSubject('math', '#f59e0b', this)">📐</button>
  <button class="subj-tab" onclick="switchSubject('science', '#10b981', this)">🔬</button>
  <button class="subj-tab" onclick="switchSubject('custom', '#ec4899', this)">✨</button>
  <button class="subj-tab" onclick="openQuizSection(this)" style="--active-color: #8b5cf6;">📝</button>
</div>

<div class="container" id="quiz-container" style="display:none;">
  <div class="hero" style="background: #8b5cf6;">
    <h2 style="font-weight:800; font-size:28px;">Mening Quizlarim</h2>
    <p id="quizCount" style="opacity:0.9; font-size:14px;">0 ta savol mavjud</p>
  </div>

  <div class="gen-section">
    <div class="gen-row">
      <input class="gen-input" id="qInput" placeholder="Savol matni..."/>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <input class="gen-input" id="opt1" placeholder="A variant (To'g'ri)"/>
        <input class="gen-input" id="opt2" placeholder="B variant"/>
        <input class="gen-input" id="opt3" placeholder="C variant"/>
        <input class="gen-input" id="opt4" placeholder="D variant"/>
      </div>
      <button class="save-btn" onclick="addQuiz()" style="background: #8b5cf6;">Savolni Qo'shish</button>
    </div>
  </div>

  <div id="quizList" style="display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px;"></div>
</div>

<script>
// Ma'lumotlar bazasiga quizes qismini qo'shamiz
let quizes = JSON.parse(localStorage.getItem('flashmind_quizes')) || [];

function openQuizSection(el) {
  // Barcha konteynerlarni yopish
  document.getElementById('main-container').style.display = 'none';
  document.getElementById('quiz-container').style.display = 'block';
  
  // Tablarni yangilash
  document.querySelectorAll('.subj-tab').forEach(tab => tab.classList.remove('active'));
  el.classList.add('active');
  renderQuizes();
}

// switchSubject funksiyasiga o'zgartirish: quizni yopishi kerak
const originalSwitchSubject = switchSubject;
switchSubject = function(subj, color, el) {
  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('main-container').style.display = 'block';
  originalSwitchSubject(subj, color, el);
}

function addQuiz() {
  const q = document.getElementById('qInput').value;
  const a = document.getElementById('opt1').value;
  const b = document.getElementById('opt2').value;
  const c = document.getElementById('opt3').value;
  const d = document.getElementById('opt4').value;

  if(!q || !a || !b || !c || !d) return alert("Hamma maydonlarni to'ldiring! A variant doim to'g'ri javob bo'lsin.");

  quizes.push({ q, options: [a, b, c, d] });
  localStorage.setItem('flashmind_quizes', JSON.stringify(quizes));
  
  // Tozalash
  document.getElementById('qInput').value = '';
  document.getElementById('opt1').value = '';
  document.getElementById('opt2').value = '';
  document.getElementById('opt3').value = '';
  document.getElementById('opt4').value = '';
  
  renderQuizes();
}

function renderQuizes() {
  const list = document.getElementById('quizList');
  document.getElementById('quizCount').innerText = `${quizes.length} ta savol mavjud`;
  list.innerHTML = '';

  quizes.forEach((item, index) => {
    list.innerHTML += `
      <div style="background:white; padding:20px; border-radius:20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <div style="font-weight:800; margin-bottom:10px;">${index + 1}. ${item.q}</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
          ${item.options.map(opt => `<button onclick="checkQuiz(this, '${item.options[0]}')" style="padding:10px; border-radius:10px; border:1px solid #f1f5f9; background:#f8faff; cursor:pointer;">${opt}</button>`).join('')}
        </div>
        <button onclick="deleteQuiz(${index})" style="margin-top:15px; color:#ef4444; border:none; background:none; font-size:12px; cursor:pointer;">Savolni o'chirish</button>
      </div>
    `;
  });
}

function checkQuiz(btn, correct) {
  if(btn.innerText === correct) {
    btn.style.background = "#10b981";
    btn.style.color = "white";
    alert("To'g'ri! 🎉");
  } else {
    btn.style.background = "#ef4444";
    btn.style.color = "white";
    alert("Xato, qayta urunib ko'ring.");
  }
}

function deleteQuiz(index) {
  quizes.splice(index, 1);
  localStorage.setItem('flashmind_quizes', JSON.stringify(quizes));
  renderQuizes();
}
</script>
<div class="hero" style="background: #8b5cf6;">
  <h2 style="font-weight:800; font-size:28px;">Mening Quizlarim</h2>
  <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px;">
    <p id="quizCount" style="opacity:0.9; font-size:14px;">0 ta savol</p>
    <p id="scoreBoard" style="background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 10px; font-size:14px; font-weight: 700;">Ball: 0</p>
  </div>
</div>
